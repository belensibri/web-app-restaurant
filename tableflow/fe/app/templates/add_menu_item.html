{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Add Menu Item</h2>
    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Price</label>
            <input type="number" step="0.01" name="price" required>
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" required placeholder="e.g. appetizer, main, dessert">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_available" checked> Is Available
            </label>
        </div>
        <button type="submit">Save Menu Item</button>
    </form>
</div>
{% endblock %}
