{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 800px;">
    <h2>Place New Order</h2>
    <form method="POST">
        <div class="form-group">
            <label>Table Number</label>
            <input type="number" name="table_number" required min="1">
        </div>
        <div class="form-group">
            <label>Order Notes</label>
            <textarea name="notes" rows="2"></textarea>
        </div>
        
        <h3>Menu Items</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item.name }} <br><small>{{ item.category }}</small></td>
                        <td>${{ item.price }}</td>
                        <td>
                            <input type="number" name="qty_{{ item.id }}" min="0" value="0" style="width: 60px;">
                        </td>
                        <td>
                            <input type="text" name="notes_{{ item.id }}" placeholder="special instructions">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
        <button type="submit" style="margin-top: 20px;">Submit Order</button>
    </form>
</div>
{% endblock %}
